<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Calculadora</title>
  </head>
  <body>
    <div class="container">
      <div id="calculadora">
        <div id="historico">
          <div id="historico-header">
            <span>Histórico</span>
            <button id="limpar-historico" onclick="limparHistorico()">
              <img class="lixeira" src="delete.png" alt="Imagem de lixeira" />
            </button>
          </div>
          <div id="historico-lista"></div>
        </div>

        <input id="display" />
        <div class="calculadora-corpo">
          <div class="calculadora-botoes">
            <button id="limpar" onclick="limpar(true)">C</button>
            <button class="operador" id="parenteses" onclick="escrever(this)">
              ( )
            </button>
            <button class="operador" id="porcentagem" onclick="escrever(this)">
              %
            </button>
            <button class="operador" id="dividir" onclick="escrever(this)">
              &#247;
            </button>
            <button id="sete" class="numero" onclick="escrever(this)">7</button>
            <button class="numero" id="oito" onclick="escrever(this)">8</button>
            <button class="numero" id="nove" onclick="escrever(this)">9</button>
            <button class="operador" id="multiplicar" onclick="escrever(this)">
              x
            </button>
            <button class="numero" id="quatro" onclick="escrever(this)">
              4
            </button>
            <button class="numero" id="cinco" onclick="escrever(this)">
              5
            </button>
            <button class="numero" id="seis" onclick="escrever(this)">6</button>
            <button class="operador" id="subtrair" onclick="escrever(this)">
              -
            </button>
            <button class="numero" id="um" onclick="escrever(this)">1</button>
            <button class="numero" id="dois" onclick="escrever(this)">2</button>
            <button class="numero" id="tres" onclick="escrever(this)">3</button>
            <button class="operador" id="somar" onclick="escrever(this)">
              +
            </button>
            <button id="limpar-tudo" onclick="limpar(false)">AC</button>
            <button class="numero" id="zero" onclick="escrever(this)">0</button>
            <button class="numero" id="virgula" onclick="escrever(this)">
              ,
            </button>
            <button id="igual" onclick="calcular()">=</button>
          </div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
